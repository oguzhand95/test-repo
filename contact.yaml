# yaml-language-server: $schema=https://api.cerbos.dev/latest/cerbos/policy/v1/Policy.schema.json
# docs: https://docs.cerbos.dev/cerbos/latest/policies/resource_policies
---
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: contact
  importDerivedRoles:
    - common_roles
  rules:
    - roles:
        - user
      effect: EFFECT_ALLOW
      actions:
        - create
        - read
        - update

    - roles:
        - admin
      effect: EFFECT_ALLOW
      actions:
        - delete:soft
        - delete:hard

    - derivedRoles:
        - owner
      actions:
        - delete:soft
      effect: EFFECT_ALLOW
